name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax Check
        run: |
          node --check server.mjs
          node --check scripts/lib/kiro.mjs
          node --check scripts/setup.mjs
          node --check scripts/doctor.mjs
          node --check scripts/adapt-kiro.mjs

      - name: Docker Compose Config Check
        run: docker compose -f compose.yaml config
