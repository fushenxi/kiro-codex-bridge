name: Release Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build Release Archive
        run: bash scripts/build-release.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: kiro-codex-bridge-release
          path: dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG}"
          NOTES_FILE="$(mktemp)"
          cat > "${NOTES_FILE}" <<'EOF'
          Release bundle for Kiro Codex Bridge.

          Included artifact:
          - kiro-codex-bridge zip bundle
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.zip --clobber
          else
            gh release create "${TAG}" dist/*.zip --title "${TITLE}" --notes-file "${NOTES_FILE}"
          fi
